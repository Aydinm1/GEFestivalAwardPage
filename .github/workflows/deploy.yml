name: Deploy Site

on:
  push:
    branches:
      - dev
      - prod
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    name: Deploy Development
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload build to development server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.DEV_FTP_SERVER }}
          username: ${{ secrets.DEV_FTP_USERNAME }}
          password: ${{ secrets.DEV_FTP_PASSWORD }}
          port: ${{ secrets.DEV_FTP_PORT || 21 }}
          protocol: ${{ secrets.DEV_FTP_PROTOCOL || 'ftps' }}
          local-dir: ./dist/
          server-dir: ${{ secrets.DEV_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state.json

  deploy-prod:
    if: github.ref == 'refs/heads/prod'
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload build to production server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.PROD_FTP_SERVER }}
          username: ${{ secrets.PROD_FTP_USERNAME }}
          password: ${{ secrets.PROD_FTP_PASSWORD }}
          port: ${{ secrets.PROD_FTP_PORT || 21 }}
          protocol: ${{ secrets.PROD_FTP_PROTOCOL || 'ftps' }}
          local-dir: ./dist/
          server-dir: ${{ secrets.PROD_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state.json
